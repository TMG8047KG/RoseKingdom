name: RoseKingdom
version: '${project.version}'
main: me.rosekingdom.rosekingdom.RoseKingdom
api-version: 1.19
prefix: RK
author: TMG8047KG
description: Plugin made for the Rose Kingdom Server

commands:
  cords:
    description: Sends your coordinates to a selected Player
    usage: /<command> <Player>
    aliases:
      - cd
      - xyz
      - crd
  spawnentity:
    description: Spawns entity's
  heal:
    description: Heals player
    usage: /<command>
  home:
    description: Opens home menu
    aliases:
      - h
    usage: /<command> help