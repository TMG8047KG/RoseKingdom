name: RoseKingdom
version: '${project.version}'
main: me.rosekingdom.rosekingdom.RoseKingdom
api-version: 1.19
prefix: RK
authors: [ TMG8047KG ]
description: Plugin made for the Rose Kingdom Server

commands:
  temp_bm:
    description: Gives you a bronze medal
    usage: /<command>
  coords:
